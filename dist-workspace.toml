[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# Keep the hand-edited release workflow. It pins the Linux release build to the
# old-glibc container and smoke-tests the resulting binary.
allow-dirty = ["ci"]
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["homebrew"]
# A GitHub repo to push Homebrew formulas to
tap = "mi2428/homebrew-iperf3-rs"
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Where to host releases
hosting = "github"
# Whether source tarballs should include submodules
recursive-tarball = true
# Extra setup required before dist invokes the Cargo build.
github-build-setup = "../dist-build-setup.yml"
