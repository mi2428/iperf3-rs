- name: Prepare libiperf build inputs
  shell: bash
  run: |
    git submodule update --init --recursive
    echo "CARGO_INCREMENTAL=0" >> "${GITHUB_ENV}"
    echo "IPERF3_RS_CONFIGURE_ARGS=--without-openssl" >> "${GITHUB_ENV}"

- name: Install Linux build dependencies
  if: runner.os == 'Linux'
  shell: bash
  run: |
    sudo apt-get update
    sudo apt-get install -y --no-install-recommends \
      build-essential \
      ca-certificates \
      make \
      pkg-config

- name: Cache Cargo sources
  uses: actions/cache@v5
  with:
    path: |
      ~/.cargo/registry/index
      ~/.cargo/registry/cache
      ~/.cargo/git/db
    key: ${{ runner.os }}-release-cargo-sources-${{ hashFiles('Cargo.lock') }}
    restore-keys: ${{ runner.os }}-release-cargo-sources-

- name: Cache Rust build outputs
  uses: actions/cache@v5
  with:
    path: target
    key: ${{ runner.os }}-${{ join(matrix.targets, '-') }}-release-target-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml', 'Cargo.lock', 'build.rs', 'native/**', 'iperf3/configure', 'iperf3/src/iperf.h', 'iperf3/src/iperf_api.h') }}
    restore-keys: ${{ runner.os }}-${{ join(matrix.targets, '-') }}-release-target-
