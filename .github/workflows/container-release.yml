name: Release Container

on:
  push:
    tags:
      - v*
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: release-container-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  image:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}
          submodules: recursive
          fetch-depth: 0

      - name: Compute image metadata
        id: meta
        env:
          RELEASE_PRERELEASE: ${{ github.event_name == 'release' && github.event.release.prerelease || contains(github.ref_name, '-') }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: .github/scripts/release_metadata.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ steps.meta.outputs.source }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          build-args: |
            IPERF3_RS_BUILD_DATE=${{ steps.meta.outputs.build_date }}
            IPERF3_RS_GIT_COMMIT=${{ steps.meta.outputs.git_commit }}
            IPERF3_RS_GIT_COMMIT_DATE=${{ steps.meta.outputs.git_commit_date }}
            IPERF3_RS_GIT_DESCRIBE=${{ steps.meta.outputs.git_describe }}
          cache-from: type=gha,scope=iperf3-rs-release-image
          cache-to: type=gha,mode=max,scope=iperf3-rs-release-image
