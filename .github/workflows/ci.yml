name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  IPERF3_RS_CONFIGURE_ARGS: --without-openssl

jobs:
  check:
    name: make check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            make \
            pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --component clippy --component rustfmt

      - name: Cache Rust dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ github.job }}-cargo-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-cargo-

      - name: Run checks
        run: make check

  kani:
    name: make kani
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            make \
            pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal

      - name: Cache Rust dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ github.job }}-cargo-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-cargo-

      - name: Run Kani
        uses: model-checking/kani-github-action@v1
        with:
          kani-version: "0.67.0"
          command: make
          args: kani

  integration:
    name: make integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            make \
            pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal

      - name: Cache Rust dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ github.job }}-cargo-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-cargo-

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build integration image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: integration-test
          tags: iperf3-rs:test
          load: true
          cache-from: type=gha,scope=iperf3-rs-integration
          cache-to: type=gha,mode=max,scope=iperf3-rs-integration

      - name: Build release smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: release
          tags: iperf3-rs:release-smoke-ci
          load: true
          cache-from: type=gha,scope=iperf3-rs-release
          cache-to: type=gha,mode=max,scope=iperf3-rs-release

      - name: Run Docker integration tests
        env:
          RELEASE_SMOKE_IMAGE: iperf3-rs:release-smoke-ci
          SKIP_INTEGRATION_IMAGE_BUILD: "true"
        run: make integration

  quality-gate:
    name: quality gate
    runs-on: ubuntu-latest
    needs:
      - check
      - kani
      - integration
    if: always()
    steps:
      - name: Require all quality jobs
        run: |
          test "${{ needs.check.result }}" = "success"
          test "${{ needs.kani.result }}" = "success"
          test "${{ needs.integration.result }}" = "success"
