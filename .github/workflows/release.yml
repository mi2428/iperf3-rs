name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  IPERF3_RS_CONFIGURE_ARGS: --without-openssl

jobs:
  image:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive
          fetch-depth: 0

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          tag="${{ github.event.release.tag_name }}"
          {
            printf 'tags<<EOF\n'
            printf '%s:%s\n' "${image}" "${tag}"
            if [ "${{ github.event.release.prerelease }}" != "true" ]; then
              printf '%s:latest\n' "${image}"
            fi
            printf 'EOF\n'
            printf 'source=https://github.com/%s\n' "${GITHUB_REPOSITORY}"
            printf 'revision=%s\n' "$(git rev-parse HEAD)"
            printf 'version=%s\n' "${tag}"
            printf 'git_describe=%s\n' "$(git describe --tags --always --dirty=-dirty)"
            printf 'git_commit=%s\n' "$(git rev-parse HEAD)"
            printf 'git_commit_date=%s\n' "$(git show -s --format=%cI HEAD)"
            printf 'build_date=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ steps.meta.outputs.source }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          build-args: |
            IPERF3_RS_BUILD_DATE=${{ steps.meta.outputs.build_date }}
            IPERF3_RS_GIT_COMMIT=${{ steps.meta.outputs.git_commit }}
            IPERF3_RS_GIT_COMMIT_DATE=${{ steps.meta.outputs.git_commit_date }}
            IPERF3_RS_GIT_DESCRIBE=${{ steps.meta.outputs.git_describe }}
          cache-from: type=gha,scope=iperf3-rs-release-image
          cache-to: type=gha,mode=max,scope=iperf3-rs-release-image

  binaries:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: iperf3-rs-darwin-amd64
            runner: macos-latest
            os: darwin
            arch: amd64
          - asset: iperf3-rs-darwin-arm64
            runner: macos-latest
            os: darwin
            arch: arm64
          - asset: iperf3-rs-linux-amd64
            runner: ubuntu-latest
            os: linux
            arch: amd64
          - asset: iperf3-rs-linux-arm64
            runner: ubuntu-latest
            os: linux
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive
          fetch-depth: 0

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            make \
            pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal

      - name: Cache Rust dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            .cargo-linux
            .home-linux
            target
          key: ${{ runner.os }}-${{ matrix.asset }}-release-cargo-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.asset }}-release-cargo-

      - name: Set up QEMU
        if: matrix.os == 'linux'
        uses: docker/setup-qemu-action@v3

      - name: Build release binary
        run: make dist OS=${{ matrix.os }} ARCH=${{ matrix.arch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release-assets:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs:
      - binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Write checksums
        run: |
          cd dist
          sha256sum iperf3-rs-* > checksums.txt

      - name: Generate Homebrew formula
        run: |
          bash scripts/generate-homebrew-formula.sh \
            "${{ github.event.release.tag_name }}" \
            dist/checksums.txt \
            dist/iperf3-rs.rb

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/iperf3-rs-* \
            dist/checksums.txt \
            dist/iperf3-rs.rb \
            --clobber

      - name: Publish Homebrew tap formula
        env:
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN is required to publish the Homebrew formula"
            exit 1
          fi

          tap_repository="${HOMEBREW_TAP_REPOSITORY:-${GITHUB_REPOSITORY_OWNER}/homebrew-iperf3-rs}"
          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          git clone \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${tap_repository}.git" \
            "${workdir}"
          mkdir -p "${workdir}/Formula"
          cp dist/iperf3-rs.rb "${workdir}/Formula/iperf3-rs.rb"

          git -C "${workdir}" config user.name "github-actions[bot]"
          git -C "${workdir}" config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${workdir}" add Formula/iperf3-rs.rb

          if git -C "${workdir}" diff --cached --quiet; then
            echo "Homebrew formula is already up to date"
            exit 0
          fi

          git -C "${workdir}" commit -m "iperf3-rs ${RELEASE_TAG}"
          git -C "${workdir}" push
