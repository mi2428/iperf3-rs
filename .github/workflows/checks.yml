name: PR Checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  IPERF3_RS_CONFIGURE_ARGS: --without-openssl

jobs:
  workflow:
    name: Workflow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: rhysd/actionlint@v1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            fish \
            pkg-config \
            zsh

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --component clippy --component rustfmt

      - name: Cache Rust dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-lint-cargo-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-lint-cargo-

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check shell completions
        run: |
          bash -n completions/iperf3-rs.bash
          zsh -n completions/_iperf3-rs
          fish -n completions/iperf3-rs.fish

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal

      - name: Cache Rust dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-test-cargo-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-cargo-

      - name: Run unit tests
        run: cargo test

  kani:
    name: Kani
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal

      - name: Cache Rust dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-kani-cargo-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-kani-cargo-

      - name: Run Kani
        uses: model-checking/kani-github-action@v1
        with:
          kani-version: "0.67.0"
          command: cargo
          args: kani

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal

      - name: Cache Rust dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-integration-cargo-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-integration-cargo-

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build integration image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: integration-test
          tags: iperf3-rs:test
          load: true
          cache-from: type=gha,scope=iperf3-rs-integration
          cache-to: type=gha,mode=max,scope=iperf3-rs-integration

      - name: Build release smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: release
          tags: iperf3-rs:release-smoke-ci
          load: true
          cache-from: type=gha,scope=iperf3-rs-release
          cache-to: type=gha,mode=max,scope=iperf3-rs-release

      - name: Run integration tests
        env:
          COMPOSE: docker compose
          DOCKER: docker
          RELEASE_SMOKE_IMAGE: iperf3-rs:release-smoke-ci
          SKIP_INTEGRATION_IMAGE_BUILD: "true"
        run: cargo test --test integration_test -- --ignored --nocapture --test-threads=1

  required:
    name: Required
    runs-on: ubuntu-latest
    needs:
      - workflow
      - lint
      - test
      - kani
      - integration
    if: always()
    steps:
      - name: Require all checks
        run: |
          test "${{ needs.workflow.result }}" = "success"
          test "${{ needs.lint.result }}" = "success"
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.kani.result }}" = "success"
          test "${{ needs.integration.result }}" = "success"
