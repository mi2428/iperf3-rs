name: PR Checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  IPERF3_RS_CONFIGURE_ARGS: --without-openssl

jobs:
  workflow:
    name: Workflow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: rhysd/actionlint@v1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            fish \
            pkg-config \
            zsh

      - name: Install Rust toolchain
        run: rustup toolchain install 1.93.0 --profile minimal --component clippy --component rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'examples/*/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Rust build outputs
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ github.job }}-target-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml', 'Cargo.lock', 'build.rs', 'native/**', 'iperf3/configure', 'iperf3/src/iperf.h', 'iperf3/src/iperf_api.h', 'examples/*/Cargo.toml', 'examples/*/Cargo.lock', 'examples/*/src/**', 'examples/*/integration_test.rs') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-target-

      - name: Check Rust formatting
        run: |
          cargo fmt --all --check
          cargo fmt --manifest-path examples/bwcheck/Cargo.toml --check

      - name: Run clippy
        run: |
          cargo clippy --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path examples/bwcheck/Cargo.toml --all-targets -- -D warnings

      - name: Build rustdoc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps

      - name: Check shell completions
        run: |
          bash -n completions/iperf3-rs.bash
          zsh -n completions/_iperf3-rs
          fish -n completions/iperf3-rs.fish

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install 1.93.0 --profile minimal

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'examples/*/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Rust build outputs
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ github.job }}-target-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml', 'Cargo.lock', 'build.rs', 'native/**', 'iperf3/configure', 'iperf3/src/iperf.h', 'iperf3/src/iperf_api.h', 'examples/*/Cargo.toml', 'examples/*/Cargo.lock', 'examples/*/src/**', 'examples/*/integration_test.rs') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-target-

      - name: Run unit tests
        run: |
          cargo test
          cargo test --manifest-path examples/bwcheck/Cargo.toml

  kani:
    name: Kani
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install 1.93.0 --profile minimal

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'examples/*/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Rust build outputs
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ github.job }}-target-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml', 'Cargo.lock', 'build.rs', 'native/**', 'iperf3/configure', 'iperf3/src/iperf.h', 'iperf3/src/iperf_api.h', 'examples/*/Cargo.toml', 'examples/*/Cargo.lock', 'examples/*/src/**', 'examples/*/integration_test.rs') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-target-

      - name: Run Kani
        uses: model-checking/kani-github-action@v1
        with:
          kani-version: "0.67.0"
          command: cargo
          args: kani

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install 1.93.0 --profile minimal

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'examples/*/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Rust build outputs
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ github.job }}-target-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml', 'Cargo.lock', 'build.rs', 'native/**', 'iperf3/configure', 'iperf3/src/iperf.h', 'iperf3/src/iperf_api.h', 'examples/*/Cargo.toml', 'examples/*/Cargo.lock', 'examples/*/src/**', 'examples/*/integration_test.rs') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-target-

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build integration image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: integration-test
          tags: iperf3-rs:test
          load: true
          cache-from: type=gha,scope=iperf3-rs-integration
          cache-to: type=gha,mode=max,scope=iperf3-rs-integration

      - name: Build release smoke image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: release
          tags: iperf3-rs:release-smoke-ci
          load: true
          cache-from: type=gha,scope=iperf3-rs-release
          cache-to: type=gha,mode=max,scope=iperf3-rs-release

      - name: Run integration tests
        env:
          COMPOSE: docker compose
          DOCKER: docker
          RELEASE_SMOKE_IMAGE: iperf3-rs:release-smoke-ci
          SKIP_INTEGRATION_IMAGE_BUILD: "true"
        run: cargo test --test integration_test -- --ignored --nocapture --test-threads=1

      - name: Build bwcheck example image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: examples/bwcheck/Dockerfile
          tags: iperf3-rs-bwcheck:test
          load: true
          cache-from: type=gha,scope=iperf3-rs-example-bwcheck
          cache-to: type=gha,mode=max,scope=iperf3-rs-example-bwcheck

      - name: Run bwcheck example integration
        env:
          CARGO_TARGET_DIR: target/examples/bwcheck
          COMPOSE: docker compose
          DOCKER: docker
          SKIP_EXAMPLE_IMAGE_BUILD: "true"
        run: cargo test --manifest-path examples/bwcheck/Cargo.toml --test integration_test -- --ignored --nocapture --test-threads=1

  dist:
    name: Dist
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: linux-amd64
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: linux-arm64
    env:
      LINUX_BUILD_IMAGE: rust:1.93-bullseye
      LINUX_CACHE_KEY: rust-1.93-bullseye
      LINUX_SMOKE_IMAGE: debian:bullseye-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Show Docker versions
        run: |
          docker version

      - name: Cache Linux dist build outputs
        uses: actions/cache@v5
        with:
          path: |
            .cargo-linux/${{ matrix.arch }}
            target/linux-${{ matrix.arch }}-${{ env.LINUX_CACHE_KEY }}
          key: ${{ runner.os }}-${{ matrix.arch }}-${{ env.LINUX_CACHE_KEY }}-dist-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml', 'Cargo.lock', 'build.rs', 'native/**', 'iperf3/configure', 'iperf3/src/iperf.h', 'iperf3/src/iperf_api.h') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-${{ env.LINUX_CACHE_KEY }}-dist-

      - name: Build Linux dist binary
        env:
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -Eeuo pipefail

          mkdir -p "dist" ".cargo-linux/${ARCH}" ".home-linux/${LINUX_CACHE_KEY}/${ARCH}"
          host_uid="$(id -u)"
          host_gid="$(id -g)"

          docker run --rm \
            --platform "${PLATFORM}" \
            -e "HOME=/workspace/.home-linux/${LINUX_CACHE_KEY}/${ARCH}" \
            -e "CARGO_HOME=/workspace/.cargo-linux/${ARCH}" \
            -e "CARGO_TARGET_DIR=/workspace/target/linux-${ARCH}-${LINUX_CACHE_KEY}" \
            -e "IPERF3_RS_CONFIGURE_ARGS=${IPERF3_RS_CONFIGURE_ARGS}" \
            -v "${PWD}:/workspace" \
            -w /workspace \
            "${LINUX_BUILD_IMAGE}" \
            bash -eu -o pipefail -c " \
              apt-get update >/dev/null; \
              apt-get install -y --no-install-recommends build-essential make pkg-config ca-certificates >/dev/null; \
              cargo build --release; \
              cp target/linux-${ARCH}-${LINUX_CACHE_KEY}/release/iperf3-rs dist/iperf3-rs-${SUFFIX}; \
              chmod +x dist/iperf3-rs-${SUFFIX}; \
              chown -R ${host_uid}:${host_gid} dist target/linux-${ARCH}-${LINUX_CACHE_KEY} .cargo-linux/${ARCH} .home-linux/${LINUX_CACHE_KEY}/${ARCH}"

      - name: Smoke Linux dist binary on Debian bullseye
        env:
          PLATFORM: ${{ matrix.platform }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -Eeuo pipefail

          docker run --rm \
            --platform "${PLATFORM}" \
            -v "${PWD}:/workspace:ro" \
            -w /workspace \
            "${LINUX_SMOKE_IMAGE}" \
            "/workspace/dist/iperf3-rs-${SUFFIX}" -h >/dev/null

          docker run --rm \
            --platform "${PLATFORM}" \
            -v "${PWD}:/workspace:ro" \
            -w /workspace \
            "${LINUX_SMOKE_IMAGE}" \
            "/workspace/dist/iperf3-rs-${SUFFIX}" --version >/dev/null

  required:
    name: Required
    runs-on: ubuntu-latest
    needs:
      - workflow
      - lint
      - test
      - kani
      - integration
      - dist
    if: always()
    steps:
      - name: Require all checks
        run: |
          test "${{ needs.workflow.result }}" = "success"
          test "${{ needs.lint.result }}" = "success"
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.kani.result }}" = "success"
          test "${{ needs.integration.result }}" = "success"
          test "${{ needs.dist.result }}" = "success"
