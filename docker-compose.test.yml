name: iperf3-rs-test

services:
  sut:
    image: iperf3-rs:test
    command: ["iperf3-rs", "-s"]

  reference:
    image: iperf3-rs:test
    command: ["iperf3", "-s"]

  pushgateway:
    image: prom/pushgateway:v1.11.2

  runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: iperf3-rs:test
    depends_on:
      - sut
      - reference
      - pushgateway
