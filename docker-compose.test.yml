name: iperf3-rs-test

services:
  server-rs:
    image: iperf3-rs:test
    command: ["iperf3-rs", "-s"]

  reference:
    image: iperf3-rs:test
    command: ["iperf3", "-s"]

  pushgateway:
    image: prom/pushgateway:latest

  client-rs:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    image: iperf3-rs:test
    depends_on:
      - server-rs
      - reference
      - pushgateway
